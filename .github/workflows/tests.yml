name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install httpx "fastapi==0.115.6" "uvicorn[standard]==0.34.0" "motor==3.7.0" "pydantic==2.10.4" "pydantic-settings==2.7.1" "python-jose[cryptography]==3.3.0" "passlib[bcrypt]==1.7.4" "bcrypt==4.0.1" "python-multipart==0.0.20" "websockets==15.0"
        working-directory: backend

      - name: Run backend tests
        run: python3 tests/run_all.py
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies & checks
        run: |
          rm -f package-lock.json
          npm install --no-package-lock --no-audit --no-fund
          ./node_modules/.bin/tsc --noEmit
          ./node_modules/.bin/vitest run --reporter=verbose
        working-directory: frontend
